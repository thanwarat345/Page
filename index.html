<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Geely Portal PWA</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B132B">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #0B132B; }
    iframe { width: 100%; height: 100%; border: none; }
    /* ปุ่มขอสิทธิ์การแจ้งเตือน (ซ่อนไว้ก่อน) */
    #notifyBtn {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #00B4D8; color: white; border: none; padding: 12px 24px;
      border-radius: 30px; font-family: sans-serif; font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; display: none; z-index: 9999;
    }
  </style>
</head>
<body>

  <button id="notifyBtn" onclick="requestNotificationPermission()">เปิดการแจ้งเตือน</button>

  <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbwvPMb9Bu4ZTCjb6sNTIYJ3w_X5beSuiAddk7ljE15-ZsZ01UfvVRaTKYmRGiCSIN11Jg/exec" allow="camera; microphone; fullscreen; display-capture" allowfullscreen></iframe>

  <script>
    // 1. ลงทะเบียน Service Worker สำหรับ PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('Service Worker Registered!', reg);
        }).catch(err => console.error('Service Worker Error', err));
      });
    }

    // 2. ตรวจสอบสิทธิ์การแจ้งเตือน
    function checkNotificationStatus() {
      if ('Notification' in window) {
        if (Notification.permission === 'default') {
          document.getElementById('notifyBtn').style.display = 'block';
        }
      }
    }
    checkNotificationStatus();

    // 3. ขอสิทธิ์เมื่อกดปุ่ม
    function requestNotificationPermission() {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          document.getElementById('notifyBtn').style.display = 'none';
          alert('เปิดการแจ้งเตือนสำเร็จ!');
        }
      });
    }

    // 4. รับข้อความ (postMessage) จาก Iframe (GAS)
    window.addEventListener("message", (event) => {
      // ดักรับเฉพาะคำสั่ง SHOW_NOTIFICATION
      if (event.data && event.data.type === 'SHOW_NOTIFICATION') {
        const { title, body } = event.data;
        showPushNotification(title, body);
      }
    });

    // 5. สั่ง Service Worker ให้แสดงการแจ้งเตือน (เพื่อให้รองรับมือถือเต็มรูปแบบ)
    function showPushNotification(title, body) {
      if (Notification.permission === 'granted' && navigator.serviceWorker) {
        navigator.serviceWorker.ready.then(function(registration) {
          registration.showNotification(title, {
            body: body,
            icon: 'icon-192.png',
            vibrate: [200, 100, 200],
            badge: 'icon-192.png'
          });
        });
      }
    }
  </script>
</body>
</html>
